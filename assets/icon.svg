<svg width="128" height="128" viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#2c3e5e"/>
      <stop offset="1" stop-color="#19222f"/>
    </linearGradient>
  </defs>
  <!-- rounded tile -->
  <rect x="6" y="6" width="116" height="116" rx="26" fill="url(#bg)"/>
  <!-- edges (drawn first, so nodes sit on top) -->
  <g stroke="#7cc1ff" stroke-width="5" stroke-linecap="round">
    <line x1="64" y1="50" x2="40" y2="78"/>
    <line x1="64" y1="50" x2="88" y2="78"/>
  </g>
  <!-- flowchart nodes (Mermaid [ ] shape) -->
  <g fill="#eaf2fb" stroke="#7cc1ff" stroke-width="3">
    <rect x="42" y="24" width="44" height="26" rx="7"/>
    <rect x="18" y="78" width="44" height="26" rx="7"/>
    <rect x="66" y="78" width="44" height="26" rx="7"/>
  </g>
</svg>
