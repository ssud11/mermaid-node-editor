name: CI

# Test + build only. Publishing is operator-only — this workflow NEVER runs `vsce publish`.
# Actions are SHA-pinned per the CI security baseline (tags can be force-pushed; SHAs cannot).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@48b55a011bda9f5d6aeb4c2d9c7362e8dae4041e # v6.4.0
        with:
          node-version: 20
          cache: npm
      - name: Install (clean)
        run: npm ci
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Package (.vsix build verification)
        run: npx @vscode/vsce package
      # IT-2: an integration job (xvfb-run + @vscode/test-electron) gets added here.
