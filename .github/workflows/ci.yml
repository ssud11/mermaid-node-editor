name: CI

# Test + build only. Publishing is maintainer-only — this workflow NEVER runs `vsce publish`.
# Actions are SHA-pinned per the CI security baseline (tags can be force-pushed; SHAs cannot).

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - name: Install (clean)
        run: npm ci
      - name: Core — install (mermaid-node-core deps)
        run: npm ci
        working-directory: mermaid-node-core
      - name: Core — build grammar (generated-parser.js)
        run: npm run build:parser
        working-directory: mermaid-node-core
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test
      - name: Package (.vsix build verification)
        run: npx @vscode/vsce package

  integration:
    # Advisory: the real-VS-Code suite (xvfb + @vscode/test-electron) runs for
    # visibility but does NOT block the merge gate (continue-on-error). Promote to
    # blocking once it has proven stable in CI.
    runs-on: ubuntu-latest
    continue-on-error: true
    steps:
      - name: Checkout
        uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Setup Node
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7.0.0
        with:
          node-version: 20
          cache: npm
      - name: Install (clean)
        run: npm ci
      - name: Core — install + build grammar
        run: npm ci && npm run build:parser
        working-directory: mermaid-node-core
      - name: Compile (the extension bundle the dev host loads)
        run: npm run compile
      - name: Integration tests (real VS Code under Xvfb)
        run: xvfb-run -a npm run test:integration
