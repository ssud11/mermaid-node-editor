<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Locked CSP (B0 spike): script-src stays nonce-strict (no unsafe-eval);
      style-src needs 'unsafe-inline' — mermaid injects a <style> block plus
      inline style= attributes that a nonce cannot cover. img/font allow data:.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} data: blob:; script-src 'nonce-{{nonce}}'; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}} data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid Preview</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--vscode-editor-background);
        color: var(--vscode-foreground);
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size, 13px);
      }
      #preview {
        width: 100%;
        height: 100vh;
        overflow: hidden;
      }
      #preview svg {
        display: block;
        max-width: 100%;
      }
      #state {
        padding: 16px 18px;
        color: var(--vscode-descriptionForeground);
        line-height: 1.5;
      }
      #state.err {
        white-space: pre-wrap;
        color: var(--vscode-errorForeground);
        font-family: var(--vscode-editor-font-family, monospace);
      }
      #state.hidden {
        display: none;
      }
    </style>
  </head>
  <body>
    <div id="state" class="hidden"></div>
    <div id="preview"></div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
  </body>
</html>
