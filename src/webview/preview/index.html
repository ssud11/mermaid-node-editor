<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <!--
      Locked CSP: script-src stays nonce-strict (no unsafe-eval);
      style-src needs 'unsafe-inline' — mermaid injects a <style> block plus
      inline style= attributes that a nonce cannot cover. img/font allow data:.
    -->
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'none'; img-src {{cspSource}} data: blob:; script-src 'nonce-{{nonce}}'; style-src {{cspSource}} 'unsafe-inline'; font-src {{cspSource}} data:;"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Mermaid Preview</title>
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
      }
      body {
        background: var(--vscode-editor-background);
        color: var(--vscode-foreground);
        font-family: var(--vscode-font-family);
        font-size: var(--vscode-font-size, 13px);
      }
      /* The viewport: clips the pannable stage. user-select off: the labels are
         native SVG text (selectable), so a drag-pan would otherwise double as a
         text-selection gesture and paint a selection sheet across the diagram. */
      #preview {
        position: relative;
        width: 100%;
        height: 100vh;
        overflow: hidden;
        cursor: grab;
        user-select: none;
        -webkit-user-select: none;
      }
      #preview.grabbing {
        cursor: grabbing;
      }
      /* The pan/zoom layer — one CSS transform, anchored top-left. */
      #stage {
        position: absolute;
        top: 0;
        left: 0;
        transform-origin: 0 0;
        will-change: transform;
      }
      #stage svg {
        display: block;
      }
      #state {
        padding: 16px 18px;
        color: var(--vscode-descriptionForeground);
        line-height: 1.5;
      }
      /* Render error: an overlay banner ACROSS THE TOP so the last good diagram
         stays visible underneath (we don't wipe the stage on error). */
      #state.err {
        position: absolute;
        top: 0;
        left: 0;
        right: 0;
        z-index: 5;
        margin: 8px;
        padding: 10px 12px;
        border-radius: 6px;
        white-space: pre-wrap;
        max-height: 40vh;
        overflow: auto;
        font-size: 12px;
        color: var(--vscode-errorForeground);
        font-family: var(--vscode-editor-font-family, monospace);
        background: var(--vscode-inputValidation-errorBackground, rgba(60, 0, 0, 0.9));
        border: 1px solid var(--vscode-inputValidation-errorBorder, var(--vscode-errorForeground));
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.35);
      }
      #state.hidden {
        display: none;
      }
      /* Overlay zoom controls. */
      #toolbar {
        position: fixed;
        top: 8px;
        right: 8px;
        display: flex;
        align-items: center;
        gap: 2px;
        padding: 2px;
        border-radius: 6px;
        background: var(--vscode-editorWidget-background, #252526);
        border: 1px solid var(--vscode-widget-border, var(--vscode-panel-border, #3c3c3c));
        box-shadow: 0 2px 8px rgba(0, 0, 0, 0.25);
        opacity: 0.9;
        user-select: none;
      }
      #toolbar.hidden {
        display: none;
      }
      #toolbar button {
        width: 24px;
        height: 24px;
        padding: 0;
        border: none;
        border-radius: 4px;
        cursor: pointer;
        background: transparent;
        color: var(--vscode-foreground);
        font-size: 15px;
        line-height: 1;
      }
      #toolbar button:hover {
        background: var(--vscode-toolbar-hoverBackground, rgba(128, 128, 128, 0.2));
      }
      #zoom-pct {
        min-width: 42px;
        text-align: center;
        font-size: 11px;
        color: var(--vscode-descriptionForeground);
      }
      #hl-toggle.off {
        opacity: 0.4;
      }
      /* Focus highlight — a subtle theme-colored outline + soft glow on the
         node matching the source cursor's tag. !important because mermaid's own
         injected stylesheet sets stroke on the shape with higher specificity. */
      #stage .mne-focus > rect,
      #stage .mne-focus > polygon,
      #stage .mne-focus > circle,
      #stage .mne-focus > ellipse,
      #stage .mne-focus > path,
      #stage .mne-focus .label-container {
        stroke: var(--vscode-focusBorder, #007fd4) !important;
        stroke-width: 2px !important;
      }
      #stage .mne-focus {
        filter: drop-shadow(0 0 3px var(--vscode-focusBorder, #007fd4));
      }
    </style>
  </head>
  <body>
    <div id="state" class="hidden"></div>
    <div id="preview"><div id="stage"></div></div>
    <div id="toolbar" class="hidden">
      <button id="zoom-out" title="Zoom out">−</button>
      <span id="zoom-pct">100%</span>
      <button id="zoom-in" title="Zoom in">+</button>
      <button id="fit" title="Fit to view">⤢</button>
      <button id="hl-toggle" title="Highlight selected node: on" aria-pressed="true">◉</button>
    </div>
    <script nonce="{{nonce}}" src="{{scriptUri}}"></script>
  </body>
</html>
